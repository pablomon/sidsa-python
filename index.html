<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Calculadora Sidsa PWA</title>
    <link rel="canonical" href="https://simplepwa.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a74da">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">


    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Javscript -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch(err => console.log("SW registration failed", err));
            });
        }
    </script>
    <script defer src="./main.js"></script>
</head>

<body>

    <header>
        <div class="container">
            <a href="./" class="logo" aria-label="Logo">
                <img src="logo.png" alt="Logo">
            </a>
            <h1>Calculadora Sidsa PWA</h1>
        </div>
    </header>
    <section>
        <div class="container">
            <button id="install-btn" class="btn-install" style="display:none;">📲 Instalar Aplicación</button>
        </div>
    </section>


    <script>
        // Lógica de Instalación PWA
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            // Evita que el navegador muestre automáticamente su banner
            e.preventDefault();
            // Guarda el evento para dispararlo más tarde
            deferredPrompt = e;
            // Muestra nuestro botón personalizado
            installBtn.style.display = 'block';
            console.log('Evento beforeinstallprompt capturado');
        });
        
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // Muestra el prompt de instalación
            deferredPrompt.prompt();
            
            // Espera a que el usuario responda
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Respuesta del usuario: ${outcome}`);
            
            if (outcome === 'accepted') {
                console.log('App instalada con éxito');
                installBtn.style.display = 'none';
            }
            
            // Limpiamos el prompt ya que no se puede volver a usar
            deferredPrompt = null;
        });

        // Ocultar botón si ya está instalada
        window.addEventListener('appinstalled', (evt) => {
            console.log('La PWA ha sido instalada');
            installBtn.style.display = 'none';
        });

        // Verificar si ya estamos en modo standalone (instalada)
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            console.log('Estamos en modo standalone (ya instalada)');
            installBtn.style.display = 'none';
        }
    </script>

</body>

</html>
