<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Simple PWA 3</title>
    <link rel="canonical" href="https://simplepwa.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">


    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Javscript -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker && navigator.serviceWorker.register("./sw.js");
            });
        }
    </script>
    <script defer src="./main.js"></script>
</head>

<body>

    <header>
        <div class="container">
            <a href="./" class="logo" aria-label="Logo">
                <img src="logo.png" alt="Logo">
            </a>
            <h1>Simple Progressive Web App (PWA) template</h1>
        </div>
    </header>
    <section>
        <button id="install-btn" style="display:none;">Instalar Calculadora</button>
    </section>


    <script>
        // Espera a que todo el DOM esté cargado
        document.addEventListener('DOMContentLoaded', () => {
            let deferredPrompt;
            
            // Captura el evento que dispara Chrome antes de mostrar su banner
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); // bloquea el banner automático
                deferredPrompt = e; // guardamos el evento para usarlo más tarde
                
                // Mostramos el botón en la web
                const installBtn = document.getElementById('install-btn');
                installBtn.style.display = 'block';
            });
            
            const installBtn = document.getElementById('install-btn');
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                
                // Muestra el diálogo de instalación
                deferredPrompt.prompt();
                const choice = await deferredPrompt.userChoice;
                
                if (choice.outcome === 'accepted') {
                    console.log('Usuario instaló la PWA');
                } else {
                    console.log('Usuario canceló la instalación');
                }
                
                deferredPrompt = null; // Ya no se puede usar el evento
                installBtn.style.display = 'none'; // Ocultamos el botón
            });
        });
        log('Script cargado');
    </script>

</body>

</html>
